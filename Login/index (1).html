<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatureFlow — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="bg"></div>
<div id="toast"></div>

<!-- NAVBAR -->
<nav>
  <a href="#" class="nav-logo">
    <i class="ti ti-leaf"></i>
    NatureFlow
  </a>

  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Explore</a></li>
    <li><a href="#">Gallery</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-ghost">Log In</button>
    <button class="btn-solid">Sign Up</button>
  </div>

  <button class="hamburger" id="hamburger" aria-label="Open menu">
    <i class="ti ti-menu-2"></i>
  </button>
</nav>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#">Home</a>
  <a href="#">Explore</a>
  <a href="#">Gallery</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<!-- MAIN -->
<main>
  <div class="card">
    <div class="card-header">
      <div class="avatar"><i class="ti ti-leaf"></i></div>
      <h1>Welcome Back</h1>
      <p class="sub">Sign in to your NatureFlow account</p>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <i class="ti ti-mail icon-left"></i>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock icon-left"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Toggle password visibility">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <!-- Options -->
    <div class="row-opt">
      <label class="check-label">
        <input type="checkbox" id="remember" />
        Remember me
      </label>
      <a href="#" class="link-sm">Forgot password?</a>
    </div>

    <!-- Sign In -->
    <button class="login-btn" id="loginBtn" type="button">
      <i class="ti ti-login"></i>
      Sign In
    </button>

    <!-- Social -->
    <div class="divider"><span>or continue with</span></div>

    <div class="social">
      <button class="social-btn" type="button">
        <!-- Google SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>

      <button class="social-btn" type="button">
        <!-- GitHub SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </button>

      <button class="social-btn" type="button">
        <!-- Twitter/X SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X
      </button>
    </div>

    <p class="register-row">
      Don't have an account? <a href="#">Create one free</a>
    </p>
  </div>
</main>

<script src="script.js"></script>

</body>
</html>
